title: SYSVOL GPP File Access from Non-Domain-Controller
id: gpp-sysvol-access-non-dc-corplab
status: experimental
description: >
  Detects SMB access to SYSVOL share from a non-machine account on a non-DC IP.
  May indicate GPP cpassword harvesting (T1552.006). Signal is extremely low in
  most environments — SYSVOL access is normal for all domain workstations pulling
  Group Policy. Prevention (auditing and removing GPP cpassword files via MS14-025)
  is more effective than reactive detection.
references:
  - https://attack.mitre.org/techniques/T1552/006/
  - https://support.microsoft.com/kb/2962486
  - https://docs.microsoft.com/en-us/openspecs/windows_protocols/ms-gppref
author: CorpLab Blue Team
date: 2026-04-26
tags:
  - attack.credential_access
  - attack.t1552.006
  - attack.discovery
  - attack.t1135
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 5140
    ShareName: SYSVOL
  filter_machines:
    SubjectUserName|endswith: '$'
  filter_dc_ip:
    IpAddress|startswith:
      - '10.10.10.40'
      - '10.10.10.1'
  condition: selection and not filter_machines and not filter_dc_ip
falsepositives:
  - Any domain workstation pulling Group Policy (extremely common)
  - Admin workstations browsing SYSVOL
  - Backup and monitoring agents
  - Linux domain members with sssd/winbind
level: low
fields:
  - SubjectUserName
  - IpAddress
  - ShareName
  - ObjectName

# ============================================================
# IMPORTANT OPERATIONAL NOTE
# ============================================================
# This rule has near-zero fidelity in production environments.
# SYSVOL access is required for Group Policy to function.
# Use only for:
#   - Hunting specific known-bad source IPs
#   - Post-incident forensics
#   - Scoping to unusual hours or non-workstation IPs
#
# EFFECTIVE CONTROLS (preventive):
#   1. PowerShell audit for cpassword in SYSVOL:
#      Get-ChildItem -Path "C:\Windows\SYSVOL" -Recurse -Filter "*.xml" |
#        Select-String -Pattern "cpassword" | Select-Object Path, Line
#
#   2. Apply MS14-025 (KB2962486) — disables GPP password storage
#   3. Deploy LAPS for local admin account management
#
# SPL translation:
#   index=windows EventCode=5140 Share_Name=SYSVOL
#   | where NOT match(Account_Name, "\$$")
#   | where NOT match(Client_Address, "^10\.10\.10\.(40|1)$")
#   | table _time, Account_Name, Client_Address
#
# Lab result: 0 events observed during ATK-007 execution.
# Detection rate: 0/3 (0%). Prevention is the correct control.
